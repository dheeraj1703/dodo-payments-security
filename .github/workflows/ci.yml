name: Task 2 - Secure CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  attestations: write


env:

  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ledger-api

  IMAGE_TAG: ${{ github.sha }}



jobs:


############################################################
# BUILD + SECURITY + SUPPLY CHAIN
############################################################


  security-ci:


    name: Build Scan and Security Gates


    runs-on: ubuntu-latest



    steps:



############################################################
# CHECKOUT
############################################################


      - name: Checkout Repository

        uses: actions/checkout@v4





############################################################
# DOCKER BUILDX
############################################################


      - name: Docker Buildx Setup

        uses: docker/setup-buildx-action@v3





############################################################
# BUILD LOCAL IMAGE FOR SCANNING
############################################################


      - name: Build Docker Image


        run: |


          docker build \
            -f ledger-api-assignment/app/Dockerfile \
            -t ledger-api:test \
            ledger-api-assignment/app



      - name: Verify Docker Image


        run: docker images






############################################################
# SEMGREP SAST
############################################################


      - name: Run Semgrep SAST


        uses: semgrep/semgrep-action@v1


        with:

          config: p/security-audit


        continue-on-error: true






############################################################
# INSTALL TRIVY
############################################################


      - name: Install Trivy


        run: |


          sudo apt-get update

          sudo apt-get install -y curl


          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin


          trivy --version






############################################################
# TRIVY IMAGE SCAN
############################################################


      - name: Trivy Image Scan


        run: |


          trivy image \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0 \
          ledger-api:test






############################################################
# TRIVY FILESYSTEM SCAN
############################################################


      - name: Trivy Filesystem Scan


        run: |


          trivy fs \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0 \
          .






############################################################
# GITLEAKS
############################################################


      - name: Gitleaks Secret Scan


        uses: gitleaks/gitleaks-action@v2


        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


        continue-on-error: true






############################################################
# LOGIN GHCR
############################################################


      - name: Login to GHCR


        uses: docker/login-action@v3


        with:


          registry: ghcr.io


          username: ${{ github.actor }}


          password: ${{ secrets.GITHUB_TOKEN }}






############################################################
# BUILD AND PUSH IMAGE WITH DIGEST
############################################################


      - name: Build and Push Image


        id: build


        uses: docker/build-push-action@v6


        with:


          context: ledger-api-assignment/app


          file: ledger-api-assignment/app/Dockerfile


          push: true


          tags: |


            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}






############################################################
# COSIGN INSTALL
############################################################


      - name: Install Cosign


        uses: sigstore/cosign-installer@v3






############################################################
# SIGN IMAGE
############################################################


      - name: Sign Container Image


        run: |


          cosign sign \
          --yes \
          $IMAGE_NAME@${{ steps.build.outputs.digest }}







############################################################
# VERIFY IMAGE SIGNATURE
############################################################


      - name: Verify Signature


        run: |


          cosign verify \
          $IMAGE_NAME@${{ steps.build.outputs.digest }} \
          --certificate-identity-regexp \
          "https://github.com/${{ github.repository }}/.*" \
          --certificate-oidc-issuer \
          "https://token.actions.githubusercontent.com"







############################################################
# SLSA PROVENANCE
############################################################


      - name: Generate SLSA Provenance


        uses: actions/attest-build-provenance@v2


        with:


          subject-name: ${{ env.IMAGE_NAME }}


          subject-digest: ${{ steps.build.outputs.digest }}


          push-to-registry: true






############################################################
# REPORTS
############################################################


      - name: Create Reports


        if: always()


        run: |


          mkdir -p reports


          docker images > reports/docker-images.txt






      - name: Upload Security Reports


        if: always()


        uses: actions/upload-artifact@v4


        with:


          name: task2-security-reports


          path: reports/