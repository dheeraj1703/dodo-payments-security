name: Task 2 - Secure CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  IMAGE_NAME: ledger-api
  IMAGE_TAG: starter

jobs:
  security-ci:
    name: Build, Scan and Verify
    runs-on: ubuntu-latest

    steps:
      #########################################################
      # Checkout
      #########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################
      # Docker Buildx
      #########################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #########################################################
      # Build Image
      #########################################################

      - name: Build Docker Image
        run: |
          docker build \
            -f ledger-api-assignment/app/Dockerfile \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            ledger-api-assignment/app

      #########################################################
      # Verify
      #########################################################

      - name: Verify Docker Image
        run: docker images

      #########################################################
      # Semgrep SAST
      #########################################################

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit
        continue-on-error: true

      #########################################################
      # Install Trivy (Official Script)
      #########################################################

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      #########################################################
      # Trivy Image Scan
      #########################################################

      - name: Scan Docker Image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            ${IMAGE_NAME}:${IMAGE_TAG}

      #########################################################
      # Trivy Filesystem Scan
      #########################################################

      - name: Scan Filesystem
        run: |
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            .

      #########################################################
      # Gitleaks Secret Scan
      #########################################################

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      #########################################################
      # Save Reports
      #########################################################

      - name: Create Reports Folder
        run: mkdir reports

      - name: Save Docker Images List
        run: docker images > reports/docker-images.txt

      #########################################################
      # Upload Reports
      #########################################################

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/